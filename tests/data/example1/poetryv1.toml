[tool.poetry]
name = "depgather"
version = "0.3.0"
description = "Get a list of deps given a pyproject.toml, uv.lock, requirements.txt etc"
authors = ["FredHappyface"]

[tool.poetry.dependencies]
python = ">=3.12"
requirements-parser = ">=0.13.0"
tomli = ">=2.2.1"

[tool.poetry.group.uv.dependencies]
uv = ">=0.6.8"

[tool.poetry.group.pip.dependencies]
pip = ">=26.0.1"

[tool.poetry.group.dev.dependencies]
basedpyright = ">=1.39.7"
coverage = ">=7.6.12"
pytest = ">=8.3.5"
ruff = ">=0.11.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"